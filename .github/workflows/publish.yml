name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Build package
        run: uv build

      - name: Verify sdist size
        run: |
          SIZE=$(stat -c%s dist/*.tar.gz)
          if [ "$SIZE" -gt 500000 ]; then
            echo "ERROR: sdist is ${SIZE} bytes (>500KB). Check for accidentally included files."
            tar tzf dist/*.tar.gz
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
